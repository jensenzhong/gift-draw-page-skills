<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>女生节心愿礼物抽选</title>
  <style>
    :root {
      --bg-top: #fff5f1;
      --bg-bottom: #ffd9d9;
      --card: rgba(255, 255, 255, 0.78);
      --card-strong: rgba(255, 255, 255, 0.92);
      --text: #5c2d3a;
      --subtext: #8f5f6c;
      --accent: #ff7d96;
      --accent-deep: #e95876;
      --shadow: 0 18px 50px rgba(193, 88, 118, 0.2);
      --heart-size: min(84vw, 820px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 34%),
        radial-gradient(circle at top right, rgba(255, 233, 238, 0.9), transparent 32%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      filter: blur(10px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -100px;
      left: -60px;
      background: #ffd0db;
    }

    body::after {
      right: -70px;
      bottom: -100px;
      background: #ffc5c5;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1100px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 12px 0 18px;
    }

    .hero {
      text-align: center;
      margin-bottom: 6px;
      animation: fade-up 0.9s ease;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      color: var(--accent-deep);
      font-size: 14px;
      letter-spacing: 0.08em;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(233, 88, 118, 0.12);
    }

    h1 {
      margin: 12px 0 6px;
      font-size: clamp(30px, 4.4vw, 52px);
      line-height: 1.05;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 760px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--subtext);
    }

    .heart-board {
      position: relative;
      z-index: 1;
      width: var(--heart-size);
      aspect-ratio: 1 / 0.94;
      margin: -30px auto 2px;
      animation: fade-up 1.1s ease;
    }

    .heart-shell {
      position: absolute;
      inset: -3% 1% -10%;
      filter: drop-shadow(0 22px 45px rgba(193, 88, 118, 0.18));
    }

    .heart-shell::after {
      content: "";
      position: absolute;
      inset: 22% 18% 10%;
      background: radial-gradient(circle, rgba(255, 154, 178, 0.26), rgba(255, 255, 255, 0));
      filter: blur(28px);
    }

    .heart-shape {
      width: 100%;
      height: 100%;
      display: block;
    }

    .heart-grid {
      position: absolute;
      inset: 9% 8% 10%;
    }

    .choice {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transform: translate(-50%, -50%);
      width: clamp(82px, 8.6vw, 102px);
      min-height: 80px;
      padding: 10px 7px;
      border: 0;
      border-radius: 20px;
      background: var(--card);
      color: var(--text);
      font: inherit;
      font-size: clamp(10.5px, 0.96vw, 12.5px);
      line-height: 1.28;
      text-align: center;
      word-break: break-word;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(172, 83, 112, 0.14);
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      animation: float-in 0.65s ease both;
      animation-delay: calc(var(--i) * 0.05s);
    }

    .choice:hover,
    .choice:focus-visible {
      transform: translate(-50%, -50%) translateY(-4px) scale(1.03);
      box-shadow: 0 16px 30px rgba(172, 83, 112, 0.22);
      background: var(--card-strong);
      outline: none;
    }

    .choice.used {
      opacity: 0.5;
      color: #9f7f88;
      background:
        repeating-linear-gradient(
          -45deg,
          rgba(255, 255, 255, 0.72),
          rgba(255, 255, 255, 0.72) 8px,
          rgba(245, 223, 229, 0.88) 8px,
          rgba(245, 223, 229, 0.88) 16px
        );
      box-shadow: 0 6px 16px rgba(172, 83, 112, 0.06);
      cursor: not-allowed;
      pointer-events: none;
    }

    .choice.used:hover,
    .choice.used:focus-visible {
      transform: translate(-50%, -50%);
      box-shadow: 0 6px 16px rgba(172, 83, 112, 0.06);
      outline: none;
    }

    .choice.used::after {
      content: "已抽过";
      position: absolute;
      top: 6px;
      right: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(194, 134, 148, 0.9);
      color: #fff;
      font-size: 10px;
      line-height: 1.2;
      letter-spacing: 0.04em;
    }

    .choice.used .choice-number {
      background: rgba(194, 134, 148, 0.18);
      color: #a56d7c;
    }

    .choice.used .choice-label {
      text-decoration: line-through;
    }

    .choice-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 125, 150, 0.14);
      color: var(--accent-deep);
      font-size: 12px;
      font-weight: 700;
    }

    .choice-label {
      display: block;
    }

    .controls {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 10px 0 4px;
    }

    .tip {
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--subtext);
      font-size: 13px;
      box-shadow: 0 10px 25px rgba(171, 91, 117, 0.1);
      backdrop-filter: blur(8px);
    }

    .ghost-btn {
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      padding: 10px 18px;
      font: inherit;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(233, 88, 118, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .ghost-btn:hover,
    .ghost-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 16px 26px rgba(233, 88, 118, 0.28);
      outline: none;
    }

    .ghost-btn.secondary {
      background: rgba(255, 255, 255, 0.82);
      color: var(--accent-deep);
      box-shadow: 0 10px 22px rgba(171, 91, 117, 0.12);
    }

    .ghost-btn.secondary:hover,
    .ghost-btn.secondary:focus-visible {
      box-shadow: 0 14px 24px rgba(171, 91, 117, 0.16);
    }

    .footer-note {
      width: min(900px, calc(100vw - 32px));
      margin: 8px auto 0;
      padding: 12px 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.68);
      color: var(--subtext);
      line-height: 1.5;
      font-size: 13px;
      box-shadow: 0 12px 30px rgba(178, 95, 120, 0.12);
      backdrop-filter: blur(8px);
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(93, 42, 57, 0.28);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 10;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-card {
      position: relative;
      overflow: hidden;
      width: min(520px, 100%);
      padding: 22px 22px 24px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 250, 251, 0.98), rgba(255, 241, 244, 0.94));
      border: 1px solid rgba(255, 125, 150, 0.16);
      box-shadow: 0 26px 60px rgba(123, 52, 74, 0.2);
      transform: translateY(10px) scale(0.98);
      transition: transform 0.2s ease;
    }

    .modal.open .modal-card {
      transform: translateY(0) scale(1);
    }

    .confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 20;
    }

    .confetti-piece {
      position: absolute;
      top: 10%;
      left: 50%;
      width: 16px;
      height: 34px;
      border-radius: 999px;
      background: var(--confetti-color, #ff7d96);
      opacity: 0;
      transform: translate(-50%, -50%) rotate(0deg);
      box-shadow: 0 10px 22px rgba(233, 88, 118, 0.2);
      animation: confetti-burst 1900ms cubic-bezier(0.12, 0.8, 0.18, 1) forwards;
      animation-delay: var(--delay, 0ms);
    }

    .confetti-piece.ribbon {
      width: 10px;
      height: 48px;
      border-radius: 999px;
    }

    .confetti-piece.square {
      width: 18px;
      height: 18px;
      border-radius: 5px;
    }

    .confetti-piece.mini {
      width: 10px;
      height: 20px;
    }

    .modal-badge {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 125, 150, 0.12);
      color: var(--accent-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .modal-title {
      position: relative;
      z-index: 2;
      margin: 14px 0 0;
      font-size: 30px;
      text-align: center;
    }

    .modal-subtitle {
      position: relative;
      z-index: 2;
      margin: 10px 0 0;
      color: var(--subtext);
      line-height: 1.7;
      text-align: center;
    }

    .gift-box {
      position: relative;
      z-index: 2;
      margin: 22px 0 14px;
      padding: 22px 18px 20px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 199, 211, 0.28), transparent 42%),
        linear-gradient(135deg, rgba(255, 245, 247, 0.98), rgba(255, 255, 255, 0.98));
      border: 1px solid rgba(255, 125, 150, 0.16);
      text-align: center;
    }

    .gift-box::before {
      content: "开奖卡片";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .gift-label {
      font-size: 13px;
      color: var(--accent-deep);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .gift-text {
      margin-top: 10px;
      font-size: 28px;
      line-height: 1.4;
      font-weight: 700;
      color: var(--text);
    }

    .blessing-panel {
      position: relative;
      z-index: 2;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--subtext);
      line-height: 1.8;
      text-align: center;
    }

    .modal-actions {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .text-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      cursor: pointer;
    }

    .text-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #fff;
    }

    .text-btn.secondary {
      background: rgba(255, 125, 150, 0.12);
      color: var(--accent-deep);
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float-in {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(14px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0) scale(1);
      }
    }

    @keyframes confetti-burst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(0deg) scale(0.65);
      }
      12% {
        opacity: 1;
      }
      72% {
        opacity: 0.95;
      }
      100% {
        opacity: 0;
        transform:
          translate(
            calc(-50% + var(--dx, 0px)),
            calc(-50% + var(--dy, 140px))
          )
          rotate(var(--rotate, 180deg))
          scale(var(--scale, 1));
      }
    }

    @media (max-width: 780px) {
      .page {
        padding-top: 10px;
      }

      .heart-board {
        width: min(94vw, 620px);
        aspect-ratio: 1 / 1;
      }

      .heart-shell {
        inset: -1% 0 -7%;
      }

      .choice {
        width: clamp(74px, 15.5vw, 90px);
        min-height: 70px;
        padding: 8px 6px;
        border-radius: 18px;
        font-size: 10.5px;
        line-height: 1.2;
      }
    }

    @media (max-width: 560px) {
      .hero {
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 13px;
      }

      .heart-board {
        width: min(98vw, 390px);
        aspect-ratio: 1 / 1.08;
      }

      .heart-shell {
        inset: 2% 0 -5%;
      }

      .choice {
        width: 68px;
        min-height: 60px;
        border-radius: 16px;
        font-size: 9.5px;
        line-height: 1.2;
        padding: 6px 4px;
      }

      .choice-number {
        width: 20px;
        height: 20px;
        font-size: 10px;
      }

      .modal-card {
        padding: 22px 18px;
      }

      .modal-title {
        font-size: 24px;
      }

      .gift-text {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">GIRLS' DAY SPECIAL</div>
      <h1>女生节心愿礼物抽选</h1>
      <p class="subtitle">
        给你们准备了一点女生节的小惊喜。选一句最像自己的小心思，
        看看今天落到你手里的，会是哪一份可爱礼物。
      </p>
    </section>

    <div class="controls">
      <div class="tip">轻轻点开一张小卡片，开奖属于你的女生节惊喜。</div>
      <button class="ghost-btn" id="randomPick" type="button">帮我随机选一个</button>
      <button class="ghost-btn secondary" id="resetPage" type="button">刷新重置</button>
    </div>

    <section class="heart-board" aria-label="心形礼物选择区">
      <div class="heart-shell" aria-hidden="true">
        <svg class="heart-shape" viewBox="0 0 100 90" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="heartFill" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"></stop>
              <stop offset="55%" stop-color="#fff4f6" stop-opacity="0.9"></stop>
              <stop offset="100%" stop-color="#ffe5eb" stop-opacity="0.8"></stop>
            </linearGradient>
          </defs>
          <path
            d="M50 84 L43 77 C18 56 4 43 4 25 C4 12 14 4 27 4 C37 4 45 9 50 17 C55 9 63 4 73 4 C86 4 96 12 96 25 C96 43 82 56 57 77 Z"
            fill="url(#heartFill)"
          ></path>
        </svg>
      </div>
      <div class="heart-grid" id="heartGrid"></div>
    </section>

    <section class="footer-note">
      愿今天的快乐不止女生节限定，愿你们被偏爱、被惦记，也一直闪闪发光。
    </section>
  </main>

  <div class="modal" id="giftModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-badge">Girls' Day Lucky Draw</div>
      <h2 class="modal-title" id="modalTitle">礼物揭晓</h2>
      <p class="modal-subtitle" id="modalSubtitle"></p>
      <div class="gift-box">
        <div class="gift-label">Gift</div>
        <div class="gift-text" id="giftText"></div>
      </div>
      <div class="blessing-panel" id="blessingText"></div>
      <div class="modal-actions">
        <button class="text-btn primary" id="closeModal" type="button">谢谢，收下啦！</button>
      </div>
    </div>
  </div>
  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

  <script>
    const entries = [
      {
        option: "休闲时刻喜欢打打麻将",
        gift: "麻将魔方",
        blessing: "愿你手气和脑力都在线，课业生活都能一把胡。"
      },
      {

        blessing: "愿这只杯子替我天天夸你一句：你真的很牛，而且会越来越牛。"

    ];

    const positions = [
      { x: 22, y: 23 },
      { x: 38, y: 15 },
      { x: 62, y: 15 },
      { x: 78, y: 23 },
      { x: 14, y: 39 },
      { x: 32, y: 39 },
      { x: 50, y: 39 },
      { x: 68, y: 39 },
      { x: 86, y: 39 },
      { x: 23, y: 56 },
      { x: 41, y: 56 },
      { x: 59, y: 56 },
      { x: 77, y: 56 },
      { x: 31, y: 72 },
      { x: 50, y: 72 },
      { x: 69, y: 72 },
      { x: 50, y: 86 }
    ];

    const heartGrid = document.getElementById("heartGrid");
    const modal = document.getElementById("giftModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalSubtitle = document.getElementById("modalSubtitle");
    const giftText = document.getElementById("giftText");
    const blessingText = document.getElementById("blessingText");
    const confettiLayer = document.getElementById("confettiLayer");
    const closeModalButton = document.getElementById("closeModal");
    const randomPickButton = document.getElementById("randomPick");
    const resetPageButton = document.getElementById("resetPage");
    const choiceButtons = [];
    const usedIndexes = new Set();
    const confettiPalette = ["#ff7d96", "#ffd166", "#7bdff2", "#b8f2a5", "#cdb4ff", "#ff99c8"];

    function launchConfetti() {
      confettiLayer.innerHTML = "";
      const bursts = [
        { x: 8, y: 84, dxMin: 180, dxMax: 520, dyMin: -640, dyMax: -220 },
        { x: 92, y: 84, dxMin: -520, dxMax: -180, dyMin: -640, dyMax: -220 },
        { x: 20, y: 8, dxMin: -180, dxMax: 180, dyMin: 260, dyMax: 760 },
        { x: 50, y: 4, dxMin: -240, dxMax: 240, dyMin: 280, dyMax: 820 },
        { x: 80, y: 8, dxMin: -180, dxMax: 180, dyMin: 260, dyMax: 760 }
      ];

      for (let index = 0; index < 110; index += 1) {
        const piece = document.createElement("span");
        const burst = bursts[index % bursts.length];
        const dx = burst.dxMin + Math.random() * (burst.dxMax - burst.dxMin);
        const dy = burst.dyMin + Math.random() * (burst.dyMax - burst.dyMin);
        const shapeClass =
          index % 7 === 0 ? " ribbon" : index % 5 === 0 ? " square" : index % 3 === 0 ? " mini" : "";
        piece.className = "confetti-piece" + shapeClass;
        piece.style.setProperty("--dx", dx + "px");
        piece.style.setProperty("--dy", dy + "px");
        piece.style.setProperty(
          "--rotate",
          (Math.random() > 0.5 ? 1 : -1) * (320 + Math.random() * 720) + "deg"
        );
        piece.style.setProperty("--delay", Math.floor(Math.random() * 320) + "ms");
        piece.style.setProperty("--scale", 0.9 + Math.random() * 0.55);
        piece.style.setProperty(
          "--confetti-color",
          confettiPalette[index % confettiPalette.length]
        );
        piece.style.left = burst.x + (Math.random() * 8 - 4) + "%";
        piece.style.top = burst.y + (Math.random() * 8 - 4) + "%";
        confettiLayer.appendChild(piece);
      }

      window.clearTimeout(launchConfetti.timer);
      launchConfetti.timer = window.setTimeout(() => {
        confettiLayer.innerHTML = "";
      }, 2600);
    }

    function openGift(index) {
      usedIndexes.add(index);
      const selectedButton = choiceButtons[index];
      if (selectedButton) {
        selectedButton.classList.add("used");
        selectedButton.disabled = true;
      }

      const entry = entries[index];
      modalTitle.textContent = "礼物揭晓";
      modalSubtitle.textContent = "你选择的是：" + entry.option;
      giftText.textContent = entry.gift;
      blessingText.textContent = entry.blessing;
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      launchConfetti();
    }

    function closeGift() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    entries.forEach((entry, index) => {
      const button = document.createElement("button");
      button.className = "choice";
      button.type = "button";
      button.style.left = positions[index].x + "%";
      button.style.top = positions[index].y + "%";
      button.style.setProperty("--i", index + 1);
      button.innerHTML =
        '<span class="choice-number">' +
        (index + 1) +
        '</span><span class="choice-label">' +
        entry.option +
        "</span>";
      button.addEventListener("click", () => openGift(index));
      choiceButtons.push(button);
      heartGrid.appendChild(button);
    });

    closeModalButton.addEventListener("click", closeGift);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeGift();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeGift();
      }
    });

    randomPickButton.addEventListener("click", () => {
      const availableIndexes = entries
        .map((_, index) => index)
        .filter((index) => !usedIndexes.has(index));

      if (availableIndexes.length === 0) {
        window.location.reload();
        return;
      }

      const randomIndex =
        availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
      openGift(randomIndex);
    });

    resetPageButton.addEventListener("click", () => {
      window.location.reload();
    });
  </script>
</body>
</html>
